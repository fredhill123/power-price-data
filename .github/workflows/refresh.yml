name: Refresh ENTSO-E power-price data

# Keeps the published CSVs current with NO human trigger, so a non-technical
# person just opens the Excel workbook (set to refresh-on-open) and gets fresh
# data. Also runnable on demand from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "0 6 2 * *"      # 06:00 UTC on the 2nd of each month
  workflow_dispatch: {}       # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  # ---- 1) fetch each country in parallel (keeps wall-clock ~40 min) ----------
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 100          # DE 15-min data is slow on GitHub's 2-core runners (~60-65 min)
    strategy:
      fail-fast: false
      matrix:
        country: [DE, ES, PT, FR, IT]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Fetch ${{ matrix.country }} (current year, plus the prior year at rollover)
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
        working-directory: _tools
        run: |
          YEAR=$(python -c "from datetime import date; print(date.today().year)")
          # The frozen history normally ends at YEAR-1. In January it still ends at
          # YEAR-2, so the just-completed year has to be fetched too or it is lost
          # entirely (it is in neither the history nor the current-year pull).
          NEED_PRIOR=$(python -c "
          import build_hourly as b, config as c
          end = b.frozen_history_end()
          print(1 if end is not None and end < c.CURRENT_YEAR - 1 else 0)")
          if [ "$NEED_PRIOR" = "1" ]; then
            PRIOR=$((YEAR-1))
            echo "rollover detected — fetching ${{ matrix.country }} $PRIOR as well"
            python fetch.py --country ${{ matrix.country }} --years $PRIOR --force
            python fetch.py --country ${{ matrix.country }} --years $PRIOR
          fi
          echo "fetching ${{ matrix.country }} $YEAR"
          python fetch.py --country ${{ matrix.country }} --years $YEAR --force
          python fetch.py --country ${{ matrix.country }} --years $YEAR          # 2nd pass fills 503 gaps
      - uses: actions/upload-artifact@v4
        with:
          name: raw-${{ matrix.country }}
          path: data/raw/
          retention-days: 1

  # ---- 2) assemble, summarise, publish --------------------------------------
  build:
    needs: fetch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - name: Download all raw data
        uses: actions/download-artifact@v4
        with:
          path: _dl
      - name: Merge raw artifacts into data/raw
        run: |
          mkdir -p data/raw
          find _dl -name '*.parquet' -exec cp {} data/raw/ \;
          echo "raw files: $(ls data/raw | wc -l)"
      - name: Build + summarise + export
        working-directory: _tools
        run: |
          # At the January rollover, fold the completed year into the frozen history
          # first — otherwise the incremental build below silently loses that year.
          # No-op in every other month.
          python build_hourly.py --absorb-prior-year
          python build_hourly.py
          python summaries.py
          python export_csv.py          # tidy/long CSVs
          python chart_csv.py           # chart-ready wide CSVs (what Excel loads)
          python extra_summaries.py     # G1/G2/G3 hourly-granularity tables
          python build_status.py        # status.csv -> the staleness banner in Excel
      - name: Publish CSVs to /published
        run: |
          mkdir -p published/charts
          cp outputs/csv/*.csv outputs/csv/manifest.json published/
          cp outputs/csv/charts/*.csv published/charts/
          echo "Last refreshed: $(date -u +'%Y-%m-%d %H:%M UTC')" > published/LAST_REFRESH.txt
      - name: Commit published data
        run: |
          git config user.name  "power-price-bot"
          git config user.email "actions@github.com"
          # master_fixed/capacity_fixed change only at the rollover, but they MUST be
          # committed when they do — they are the history every later run builds on.
          git add published data/processed/master_fixed.parquet data/processed/capacity_fixed.parquet
          if git diff --staged --quiet; then
            echo "no data changes"
          else
            git commit -m "data refresh $(date -u +'%Y-%m-%d')"
            git pull --rebase --autostash || true
            git push
          fi
